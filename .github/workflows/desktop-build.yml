name: Build Desktop Installers

# Builds Vifug Lyrics native installers for Windows, macOS and Linux.
# - Manual runs (workflow_dispatch) upload installers as artifacts.
# - Tag pushes (v*) also attach installers to a GitHub Release.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# Needed so the release job can create/update the GitHub Release.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: --win nsis
          - os: macos-latest
            target: --mac dmg
          - os: ubuntu-latest
            target: --linux AppImage
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build web bundle
        run: bun run build
        working-directory: packages/web

      # Produce the pre-seeded library database bundled into the installer
      # (electron-builder extraResources expects packages/web/local.db).
      - name: Generate seed database
        working-directory: packages/web
        env:
          DATABASE_URL: file:local.db
        run: |
          bunx drizzle-kit push --force
          bun src/api/seed.ts

      - name: Build desktop bundle
        run: bun run build
        working-directory: packages/desktop

      - name: Package installer
        run: bunx electron-builder ${{ matrix.target }} --publish never
        working-directory: packages/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned builds: do NOT pass empty CSC_LINK/WIN_CSC_LINK env vars —
          # electron-builder treats an empty string as a certificate path and fails.
          # When you have signing certs, add the secrets back here:
          #   CSC_LINK / CSC_KEY_PASSWORD (macOS), WIN_CSC_LINK / WIN_CSC_KEY_PASSWORD (Windows),
          #   APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID (notarization)
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vifug-lyrics-${{ matrix.os }}
          path: |
            packages/desktop/release/*/*-Setup.exe
            packages/desktop/release/*/*.dmg
            packages/desktop/release/*/*.AppImage
          if-no-files-found: ignore

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/desktop/release/*/*-Setup.exe
            packages/desktop/release/*/*.dmg
            packages/desktop/release/*/*.AppImage
